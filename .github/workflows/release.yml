name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: tar -czf fty-nb-macos-arm64.tar.gz -C dist fty-nb
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-macos-arm64
          path: fty-nb-macos-arm64.tar.gz

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: arch -x86_64 pip install -r requirements.txt pyinstaller
      - run: arch -x86_64 pyinstaller fty-nb.spec --target-arch x86_64
      - run: tar -czf fty-nb-macos-x86_64.tar.gz -C dist fty-nb
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-macos-x86_64
          path: fty-nb-macos-x86_64.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: tar -czf fty-nb-linux-x86_64.tar.gz -C dist fty-nb
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-linux-x86_64
          path: fty-nb-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller fty-nb.spec
      - run: Compress-Archive -Path dist/fty-nb.exe -DestinationPath fty-nb-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: fty-nb-windows
          path: fty-nb-windows.zip

  release:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
